<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>LexRAG — IPC/BNS assistant (dev UI)</title>
<link rel="icon" type="image/svg+xml" href="/static/icon.svg">
<style>
  :root {
    --bg: #f6f6f9; --surface: #ffffff; --surface-2: #eef0f5; --border: #e3e4ea;
    --text: #16171b; --text-muted: #6b6d78;
    --accent: #6d5bd0; --accent-soft: #efecfb;
    --ipc: #6d5bd0; --ipc-soft: #efecfb;
    --bns: #1a9c78; --bns-soft: #e2f5ef;
    --warn: #92600f; --warn-soft: #fbf0dc;
    --shadow: 0 1px 2px rgba(20,20,30,0.04), 0 8px 24px rgba(20,20,30,0.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0e0f13; --surface: #16181f; --surface-2: #1d202a; --border: #2a2d38;
      --text: #eef0f5; --text-muted: #9698a6;
      --accent: #9384f2; --accent-soft: #221f38;
      --ipc: #9384f2; --ipc-soft: #221f38;
      --bns: #3fceaa; --bns-soft: #16281f;
      --warn: #eec778; --warn-soft: #2b2312;
      --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 30px rgba(0,0,0,0.35);
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 800px; margin: 0 auto; padding: 0 1.25rem 1.5rem;
    color: var(--text); background: var(--bg);
    background-image: radial-gradient(circle at 15% -10%, var(--accent-soft) 0%, transparent 45%);
    background-attachment: fixed; min-height: 100vh;
  }
  header.top { position: sticky; top: 0; z-index: 5; display: flex; align-items: center; gap: 0.75rem; padding: 1.25rem 0 1rem; background: linear-gradient(var(--bg) 70%, transparent); }
  header.top h1 { font-size: 1.1rem; margin: 0; }
  header.top p { margin: 0.15rem 0 0; font-size: 0.75rem; color: var(--text-muted); }
  .dev-tag { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--warn); background: var(--warn-soft); padding: 0.15rem 0.45rem; border-radius: 6px; margin-left: 0.4rem; }
  #log { display: flex; flex-direction: column; gap: 1.1rem; padding-bottom: 1rem; }
  .row { display: flex; gap: 0.6rem; align-items: flex-start; }
  .row.user { flex-direction: row-reverse; }
  .avatar { flex: none; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; }
  .avatar.user { background: var(--accent-soft); color: var(--accent); }
  .bubble-col { display: flex; flex-direction: column; gap: 0.4rem; max-width: 82%; }
  .row.user .bubble-col { align-items: flex-end; }
  .msg { padding: 0.7rem 1rem; border-radius: 14px; white-space: pre-wrap; line-height: 1.6; font-size: 0.95rem; box-shadow: var(--shadow); }
  .msg.user { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .typing { display: inline-flex; gap: 3px; align-items: center; padding: 0.2rem 0; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); animation: bounce 1.1s infinite ease-in-out; }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-4px); opacity: 1; } }
  .sources { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .pill { font-size: 0.72rem; font-weight: 600; padding: 0.25rem 0.6rem; border-radius: 999px; white-space: nowrap; }
  .pill.ipc { background: var(--ipc-soft); color: var(--ipc); }
  .pill.bns { background: var(--bns-soft); color: var(--bns); }
  .notes { font-size: 0.78rem; color: var(--warn); background: var(--warn-soft); border-radius: 10px; padding: 0.5rem 0.7rem; max-width: 82%; }
  form.composer { position: sticky; bottom: 0; display: flex; gap: 0.5rem; padding: 1rem 0 1.25rem; background: linear-gradient(transparent, var(--bg) 30%); }
  form.composer input { flex: 1; padding: 0.8rem 1.1rem; font-size: 0.95rem; border: 1px solid var(--border); border-radius: 14px; background: var(--surface); color: var(--text); outline: none; }
  form.composer input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  form.composer button { padding: 0 1.3rem; font-size: 0.95rem; font-weight: 600; border: none; border-radius: 14px; background: var(--accent); color: #fff; cursor: pointer; }
  form.composer button:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
<header class="top">
  <svg width="38" height="38" viewBox="0 0 48 48" aria-hidden="true">
    <defs><linearGradient id="lg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6D5BD0"/><stop offset="1" stop-color="#E8BD5C"/>
    </linearGradient></defs>
    <rect x="1" y="1" width="46" height="46" rx="11" fill="url(#lg)"/>
    <g fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="24" cy="9" r="1.6" fill="#fff" stroke="none"/>
      <line x1="24" y1="11" x2="24" y2="30"/>
      <line x1="12" y1="15" x2="36" y2="15"/>
      <line x1="12" y1="15" x2="8" y2="24"/>
      <line x1="36" y1="15" x2="40" y2="24"/>
      <path d="M4,24 Q8,31 12,24"/>
      <path d="M32,24 Q36,31 40,24"/>
      <line x1="24" y1="30" x2="15" y2="36"/>
      <line x1="24" y1="30" x2="33" y2="36"/>
      <line x1="14" y1="36" x2="34" y2="36"/>
    </g>
  </svg>
  <div>
    <h1>LexRAG <span class="dev-tag">dev UI</span></h1>
    <p>IPC / BNS research assistant — informational only, not legal advice</p>
  </div>
</header>
<div id="log"></div>
<form id="form" class="composer">
  <input id="input" placeholder="e.g. What is the BNS equivalent of IPC Section 302?" autocomplete="off" />
  <button type="submit">Ask</button>
</form>

<script>
const log = document.getElementById('log');
const form = document.getElementById('form');
const input = document.getElementById('input');
const button = form.querySelector('button');

function addRow(role) {
  const row = document.createElement('div');
  row.className = 'row ' + role;
  const avatar = document.createElement('div');
  avatar.className = 'avatar ' + role;
  avatar.textContent = role === 'user' ? 'U' : '⚖';
  const col = document.createElement('div');
  col.className = 'bubble-col';
  row.appendChild(avatar);
  row.appendChild(col);
  log.appendChild(row);
  window.scrollTo(0, document.body.scrollHeight);
  return col;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const query = input.value.trim();
  if (!query) return;
  input.value = '';
  button.disabled = true;

  addRow('user').innerHTML = '<div class="msg user"></div>';
  log.lastChild.querySelector('.msg').textContent = query;

  const assistantCol = addRow('assistant');
  const bubble = document.createElement('div');
  bubble.className = 'msg assistant';
  bubble.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
  assistantCol.appendChild(bubble);
  let answer = '';

  try {
    const resp = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true }).replace(/\r\n/g, '\n');
      const events = buffer.split('\n\n');
      buffer = events.pop();
      for (const raw of events) {
        const lines = raw.split('\n');
        let event = 'message', data = '';
        for (const line of lines) {
          if (line.startsWith('event:')) event = line.slice(6).trim();
          else if (line.startsWith('data:')) data += line.slice(5).replace(/^ /, '');
        }
        if (event === 'sections') {
          const payload = JSON.parse(data);
          if (payload.sections.length) {
            const src = document.createElement('div');
            src.className = 'sources';
            src.innerHTML = payload.sections.map(s =>
              `<span class="pill ${s.act.toLowerCase()}">${s.act} §${s.section_no}${s.section_title ? ' — ' + s.section_title : ''}</span>`
            ).join('');
            assistantCol.appendChild(src);
          }
          if (payload.notes && payload.notes.length) {
            const notesDiv = document.createElement('div');
            notesDiv.className = 'notes';
            notesDiv.textContent = payload.notes.join(' ');
            assistantCol.appendChild(notesDiv);
          }
        } else if (event === 'token') {
          answer += data;
          bubble.textContent = answer;
          window.scrollTo(0, document.body.scrollHeight);
        } else if (event === 'error') {
          answer += '\n[error: ' + data + ']';
          bubble.textContent = answer;
        }
      }
    }
  } catch (err) {
    bubble.textContent = 'Error reaching backend: ' + err.message;
  } finally {
    button.disabled = false;
  }
});
</script>
</body>
</html>
