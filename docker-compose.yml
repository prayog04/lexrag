services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Overrides whatever QDRANT_URL is in .env — from inside this
      # container, Qdrant is reachable at the "qdrant" service name, not
      # localhost. .env itself should stay set to localhost:6333, which is
      # what's correct when running ingestion/uvicorn from the host.
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant

volumes:
  qdrant_storage:
